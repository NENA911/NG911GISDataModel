# ==============================================================================
# Section: 4 GIS Data Model Layers
# Purpose: GIS data layer names shown below are meant to provide consistent 
#          naming conventions for GIS data layers across all NENA documents. 
#          This document populates the GIS Data Layers registry with the 
#          initial values for GIS Layer Name and Layer Indicator (see Section 
#          7.1 “GIS Data Layers” Registry). NENA-STA-010.3.1 populates the 
#          responder registries with the initial values for GIS Layer Name 
#          and Layer Indicator. It should be noted that the GIS Data Layers 
#          registry and the responder registries are Internet Assigned Numbers 
#          Authority (IANA) registries. IANA registries are always the most 
#          up-to-date source of layer names, and the IANA registries should be 
#          referenced directly for the recommended layer names. Please see 
#          Section 3.7 GIS Data Format for more information on local layer 
#          naming conventions.
#
#          Note that any of the layers defined in this document can be 
#          provisioned into any of the NGCS functional elements using GIS data 
#          to function. Their use outside of the above is not defined in 
#          this document.
# ==============================================================================

# ==============================================================================
# Domains used in NENA-STA-006.3-2026
# Domains last updated: 2026-02-07
#   PlaceType: https://www.iana.org/assignments/location-type-registry/location-type-registry.xml
#   PlacementMethod: http://technet.nena.org/nrs/registry/SiteStructureAddressPointPlacementMethod.xml
#   StreetNameType: http://technet.nena.org/nrs/registry/StreetNamePreTypesAndStreetNamePostTypes.xml
#   StreetNamePreTypeSeparator: http://technet.nena.org/nrs/registry/StreetNamePreTypeSeparators.xml
#   ServiceURNs - Update when IANA Service URNs are published.
# ==============================================================================

domains:
