    description: |
      Indicates whether the location marker is identified by a physical sign.
      
      Domain: P (for Posted); U (for Unposted)
      Example: P; U
    definition:
      type: TEXT
      width: 1
      required: 'Yes'
    domain: true
  LM_Label:
    section: '5.68'
    title: Location Marker Label
    description: |
      The label or text on a physical marker, or if unposted, the description of an unposted marker.
      
      Domain: None
      Example: Call Box CC-680-21; Standpipe; Pole 12; Low Water Crossing #21; Trail Intersection 15; Blue Blaze
    definition:
      type: TEXT
      width: 100
      required: 'No'
    domain: false
  LM_Type:
    section: '5.69'
    title: Location Marker Type
    description: |
      The type of feature the location marker represents.
      
      Domain: None
      Example: Call Box; Utility Pole; Water Crossing; Trail Intersection; Standpipe
    definition:
      type: TEXT
      width: 15
      required: 'No'
    domain: false
  Longitude:
    section: '5.70'
    title: Longitude
    description: |
      The type of feature the location marker represents.
      
      Domain: None
      Example: Call Box; Utility Pole; Water Crossing; Trail Intersection; Standpipe
    definition:
      type: REAL
      precision: 11
      scale: 7
      required: 'No'
    domain: false
  MSAGComm:
    section: '5.71'
    title: MSAG Community Name
    description: |
      The Community name associated with an address as given in the MSAG and may or may not be the same as the Community Name used by the postal service.
      
      Domain: None
      Example: Cypress; Spring; Austin; ALBANY; VERSAILLES; WICHITA COUNTY
      Conditional Business Rule: All Legacy fields MUST be populated with the exact matching value from the corresponding MSAG record (including space characters and casing) if and only if a value exists. If no value exists, the field shall remain empty. Any new entries MUST be consistent between the GIS and MSAG systems of record. Service provider-specific legacy deployments should be taken into consideration.
      Note: The legacy fields are used primarily for the MCS to ensure that PIDF-LO records are able to return an MSAG-valid address and/or MSAG-valid address records are able to return a PIDF-LO record. The legacy fields may also provide backward compatibility with legacy map display and CAD systems.
    definition:
      type: TEXT
      width: 30
      required: 'No'
    domain: false
  MSAGComm_L:
    section: '5.72'
    title: MSAG Community Name Left
    description: |
      The existing MSAG Community Name on the left side of the road segment relative to the FROM Node.
      
      Domain: None
      Example: Harris County; SALEM; MATSU BOROUGH
      Conditional Business Rule: All Legacy fields MUST be populated with the exact matching value from the corresponding MSAG record (including space characters and casing) if and only if a value exists. If no value exists, the field shall remain empty. Any new entries MUST be consistent between the GIS and MSAG systems of record. Service provider-specific legacy deployments should be taken into consideration.
      Note: The legacy fields are used primarily for the MCS to ensure that PIDF-LO records are able to return an MSAG-valid address and/or MSAG-valid address records are able to return a PIDF-LO record. The legacy fields may also provide backward compatibility with legacy map display and CAD systems.
    definition:
      type: TEXT
      width: 30
      required: 'No'
    domain: false
  MSAGComm_R:
    section: '5.73'
    title: MSAG Community Name Right
    description: |
      The existing MSAG Community Name on the right side of the road segment relative to the FROM Node.
      
      Domain: None
      Example: Crystal City; BROWN TWP; FRONTIER SHORES
      Conditional Business Rule: All Legacy fields MUST be populated with the exact matching value from the corresponding MSAG record (including space characters and casing) if and only if a value exists. If no value exists, the field shall remain empty. Any new entries MUST be consistent between the GIS and MSAG systems of record. Service provider-specific legacy deployments should be taken into consideration.
      Note: The legacy fields are used primarily for the MCS to ensure that PIDF-LO records are able to return an MSAG-valid address and/or MSAG-valid address records are able to return a PIDF-LO record. The legacy fields may also provide backward compatibility with legacy map display and CAD systems.
    definition:
      type: TEXT
      width: 30
      required: 'No'
    domain: false
  NGUID:
    section: '5.74'
    title: NENA Globally Unique ID
    description: |
      The NENA Globally Unique ID (Primary Key) for each record in a GIS data layer. Each record in the GIS data layer MUST have a globally unique ID. When coalescing data from other local 9-1-1 Authorities into the ECRF and LVF, this unique ID MUST continue to have only one occurrence. Additional details on how to construct the NGUID can be found in Section 3.6 NENA Globally Unique ID (NGUID).
      
      Domain: None
      Example:	
      •	urn:emergency:uid:gis:SSAP:3458:caloes.ca.gov
      •	urn:emergency:uid:gis:SSAPoly:3458:caloes.ca.gov
      •	urn:emergency:uid:gis:RCL:987364:lincoln911.gov
      •	urn:emergency:uid:gis:Psap:84274599:newbrunswick.ca
      •	urn:emergency:uid:gis:Pol:3184974 8:coronado.ca.us
      •	urn:emergency:uid:gis:Fire:{123e4567 e89b 12d3 a456 426652340000}:hanovercounty.gov
      •	urn:emergency:uid:gis:Ems:6ee38f8e 20e4 4e5e aa37 a22b7a42d9b4:alleghany.pa.us
    definition:
      type: TEXT
      width: 254
      required: 'Yes'
    domain: false
  OneWay:
    section: '5.75'
    title: One-Way
    description: |
      The direction of traffic movement along a road in relation to the FROM node and TO node of the line segment representing the road in the GIS data. The One Way field has three possible designations: B (Both), FT (From–To), and TF (To–From).
      
      B—Travel in both directions allowed
      FT—One way traveling from the FROM node to the TO node
      TF—One way traveling from the TO node to the FROM node
      Domain: B; FT; TF
      Example: See Figure 5-3 in NENA-STA-006
    definition:
      type: TEXT
      width: 2
      required: 'No'
    domain: true
  Parity_L:
    section: '5.76'
    title: Parity Left
    description: |
      The even or odd property of the address number range on the left side of the road segment relative to the FROM Node.
      
      Domain: O=Odd; E=Even; B=Both; Z=Address Range 0 0
      Example: O; E; B; Z
    definition:
      type: TEXT
      width: 1
      required: 'Yes'
    domain: false
  Parity_R:
    section: '5.77'
    title: Parity Right
    description: |
      The even or odd property of the address number range on the right side of the road segment relative to the FROM Node.
      
      Domain: O=Odd; E=Even; B=Both; Z=Address Range 0 0
      Example: O; E; B; Z
    definition:
      type: TEXT
      width: 1
      required: 'Yes'
    domain: true
  Place_Type:
    section: '5.78'
    title: Place Type
    description: |
      The type of feature identified by the address.
      
      Domain: CLDXF-US: https://www.iana.org/assignments/location-type-registry/location-type-registry.xml
      CLDXF-CA: None
      Example: airport; bank; cafe; aéroport; usine; cinéma
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 50
      required: 'No'
    domain: false
  Placement:
    section: '5.79'
    title: Placement Method
    description: |
      Description: The methodology used for placement of the address point or defining the extent of an address polygon.
      
      Domain (Address Point): Address point values are restricted to values found in the “NENA Site/Structure Address Point Placement Method Registry” at: http://technet.nena.org/nrs/registry/SiteStructureAddressPointPlacementMethod.xml
      Example (Address Point): Structure; Site; Parcel; Geocoding; ExteriorAccess; InteriorAccess; InteriorCentroid; PropertyAccess; Unknown
      Domain (Address Polygon): Address polygon values are restricted to values found in the “NENA Site/Structure Address Polygon Extent Method Registry” at: http://technet.nena.org/nrs/registry/SiteStructureAddressPointPlacementMethod.xml
      Example (Address Polygon): Structure; Site; Parcel; Interior; Other
    definition:
      type: TEXT
      width: 25
      required: 'No'
    domain: false
  Post_Code:
    section: '5.80'
    title: Postal Code
    description: |
      A system of codes that identifies an individual Post Office or metropolitan area delivery station associated with an address.
      
      Domain: As defined by each country’s postal authority (i.e., USPS, Canada Post)
      Example: 02109 (Postal Code in Boston, MA); M4E 2V4 (Postal Code in Toronto, ON)
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 7
      required: 'No'
    domain: false
  PostCodeEx:
    section: '5.81'
    title: Postal Code Extension
    description: |
      A system of 4-digit codes that are used after the US Postal Code to specify a range of USPS delivery addresses.
      
      Domain: Defined by the USPS
      Example: “0001” in “02109 0001” (Postal Code Extension in Boston, MA)
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Not Applicable
    definition:
      type: TEXT
      width: 4
      required: 'No'
    domain: false
  PostCode_L:
    section: '5.82'
    title: Postal Code Left
    description: |
      The Postal Code on the left side of the road segment relative to the FROM Node.
      
      Domain: As defined by each country’s postal authority (i.e., USPS, Canada Post) 
      Example: 44114 (Postal Code in Cleveland, OH); H3B 3B0 (Postal Code in Montreal, QC)
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 7
      required: 'No'
    domain: false
  PostCode_R:
    section: '5.86'
    title: Postal Code Right
    description: |
      The Postal Code on the right side of the road segment relative to the FROM Node.
      
      Domain: As defined by each country’s postal authority (i.e., USPS, Canada Post) 
      Example: 84101 (Postal Code in Salt Lake City, UT); R3C 3Z0 (Postal Code in Winnipeg, MB)
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 7
      required: 'No'
    domain: false
  Post_Comm:
    section: '5.84'
    title: Postal Community Name
    description: |
      A mailing place name for the Postal Code of an address.
      
      Domain: CLDXF-US: Restricted to city names given in the USPS City State file for a given Postal Code.
      CLDXF-CA: None
      Example: Bowen; Cypress; Sarnia
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 40
      required: 'No'
    domain: false
  PostComm_L:
    section: '5.85'
    title: Postal Community Name Left
    description: |
      A mailing place name for the Postal Code of an address on the left side of the road segment relative to the FROM Node.
      
      Domain: CLDXF-US: Restricted to city names given in the USPS City State file for a given Postal code.
      CLDXF-CA: None
      Example: Dublin; Magnolia; Sainte Agathe des Monts
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 40
      required: 'No'
    domain: false
  PostComm_R:
    section: '5.86'
    title: Postal Community Name Right
    description: |
      A mailing place name for the Postal Code of an address on the right side of the road segment relative to the FROM Node.
      
      Domain: CLDXF-US: Restricted to city names given in the USPS City State file for a given Postal code.
      CLDXF-CA: None
      Example: Wicket; Zanesville; Yellowknife
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 40
      required: 'No'
    domain: false
  RLName:
    section: '5.87'
    title: Rail Line Name
    description: |
      The word or phrase that constitutes the distinctive designation of the rail line.
      
      Domain: None
      Example: Chester to Rock Hill; Florence to Kingstree to Charleston; Portage la Prairie; Prince Rupert; Winnipeg Terminal
    definition:
      type: TEXT
      width: 100
      required: 'No'
    domain: false
  RLOp:
    section: '5.88'
    title: Rail Line Operator
    description: |
      The name of the operator of the rail line or the primary rail company with rights to use the rail line.
      
      Domain: None
      Example: UP; CSX; Abilene & Smoky Valley Railroad; VIA Rail; Canadian National
    definition:
      type: TEXT
      width: 100
      required: 'No'
    domain: false
  RLOwn:
    section: '5.89'
    title: Rail Line Owner
    description: |
      The name of the owner of the rail right of way.
      
      Domain: None
      Example: CSX; South Carolina Central Railroad; Canadian Pacific; Canadian National
    definition:
      type: TEXT
      width: 100
      required: 'No'
    domain: false
  RMPH:
    section: '5.90'
    title: Rail Mile Post High
    description: |
      The ending linear reference of the named rail line.
      
      Domain: Restricted to a double-precision floating point number with a precision of seven and a scale of three (e.g., REAL (7,3)).
      Example: 120.000; 257.330.
    definition:
      type: REAL
      precision: 7
      scale: 3
      required: 'No'
    domain: false
  RMPL:
    section: '5.91'
    title: Rail Mile Post Low
    description: |
      The beginning linear reference of the named rail line.
      
      Domain: Restricted to a double-precision floating point number with a precision of seven and a scale of three (e.g., REAL (7,3)).
      Example: 5.680; 14.000.
    definition:
      type: REAL
      precision: 7
      scale: 3
      required: 'No'
    domain: false
  AdNumPre_R:
    section: '5.92'
    title: Right Address Number Prefix
    description: |
      An identifier that precedes the Address Number, applying to all address numbers on the right side of the road segment relative to the FROM Node, and further identifies a location along a thoroughfare or within a defined area.
      
      Domain: None
      Example: “A” in “A19 route 117”; “75” in “75 6214 Kailua Place” (CLDXF-US only); “75-” in “75-6214 Kailua Place” (CLDXF-CA only)
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 15
      required: 'No'
    domain: false
  FromAddr_R:
    section: '5.93'
    title: Right FROM Address Number
    description: |
      In the RoadCenterLine layer, each feature has a begin point and an endpoint. The FROM Node is the begin point while the TO node is the endpoint. Each has a left side and a right side relative to a begin node and an end node. The Right FROM address number is the address number on the right side of the road segment relative to the FROM Node.
      
      Domain: None
      Example: See Figure 5-4 in NENA-STA-006
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: INTEGER
      required: 'Yes'
    domain: false
  ToAddr_R:
    section: '5.94'
    title: Right TO Address Number
    description: |
      In the RoadCenterLine layer, each feature has a begin point and an endpoint. The FROM Node is the begin point while the TO node is the endpoint. Each has a left side and a right side relative to a begin node and an end node. The Right TO address number is the address number on the right side of the road segment relative to the TO Node.
      
      Domain: None
      Example: See Figure 5-4 in NENA-STA-006
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: INTEGER
      required: 'Yes'
    domain: false
  RoadClass:
    section: '5.95'
    title: Road Class
    description: |
      The general description of the type of road. The Road Classifications used in this document are derived from the US Census MAF/TIGER Feature Classification Codes (MTFCC), which is an update to the now deprecated Census Feature Class Codes (CFCC).
      
      Domain: Primary; Secondary; Local; Ramp; Service Drive; Vehicular Trail; Walkway/Pedestrian Trail; Stairway; Alley; Private; Parking Lot; Bike Path or Trail; Bridle Path; Other
      Example: Ramp
      Note: The Road Class is completely spelled out in the attribute fields. Road Classification is based on the Census road classification found in the MAF/TIGER Feature Class Code (MTFCC) Definitions. The values are taken from the S series information in this document which provided the classification scheme for surface roads and can be found at: https://www2.census.gov/geo/pdfs/reference/mtfccs2019.pdf
      •	Primary roads are generally divided, limited access highways within the interstate highway system or under state management and are distinguished by the presence of interchanges. These highways are accessible by ramps and may include some toll highways.
      •	Secondary roads are main arteries, usually in the US Highway, State Highway, or County Highway system. These roads have one or more lanes of traffic in each direction, may or may not be divided, and usually have at grade intersections with many other roads and driveways.
      •	Local roads are generally a paved non arterial street, road, or byway that usually has a single lane of traffic in each direction. Roads in this classification include neighborhood roads, rural roads, and city streets.
      •	Ramp designates a road that allows controlled access from adjacent roads onto a limited access highway, often in the form of a cloverleaf interchange. Ramps typically do not have address ranges.
      •	Service Drive provides access to structures along the highway, usually parallel to a limited access highway. If these roads are named and addressed, they may be considered local roads.
      •	Vehicular Trail (4WD, snowmobile) is an unpaved trail or path where a four wheel drive vehicle, snowmobile, or similar vehicle is required.
      •	Walkway/Pedestrian Trail is a path that is used for walking, being either too narrow for or legally restricted from vehicular traffic.
      •	Stairway is a pedestrian passageway from one level to another by a series of steps.
      •	Alley is generally a service road that does not generally have associated addressed structures and is usually unnamed. It is located at the rear of buildings and properties.
      •	Private (service vehicles, logging, oil fields, ranches, etc.) is a road within private property that is privately maintained for service, extractive, or other purposes. These roads are often unnamed.
      •	Parking Lot is the main travel route for vehicles through a paved parking area.
      •	Bike Path or Trail is a path that is used for manual or small, motorized bicycles, being either too narrow for or legally restricted from vehicular traffic.
      •	Bridle Path is a path that is used for horses, being either too narrow for or legally restricted from vehicular traffic.
      •	Other is any road or path type that does not fit into the above categories.
    definition:
      type: TEXT
      width: 24
      required: 'No'
    domain: true
  Room:
    section: '5.96'
    title: Room
    description: |
      A single, distinctly identified, enclosed space within a structure.
      
      Domain: None
      Example: Room 137; Lobby
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 75
      required: 'No'
    domain: false
  Row:
    section: '5.97'
    title: Row
    description: |
      An identified linear feature, such as a linear arrangement of seats, workstations, equipment, or storage, within a structure, wing, unit, room, or section.
      
      Domain: None
      Example: Aisle 4; B-Line Assembly; ligne 5
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 75
      required: 'No'
    domain: false
  Seat:
    section: '5.98'
    title: Seat
    description: |
      An identified seat, desk, workstation, cubicle, or similar precise location within a structure, wing, unit, room, section, or row.
      
      Domain: None
      Example: Cubicle 5A; 5A; Desk 11; 1
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 75
      required: 'No'
    domain: false
  Section:
    section: '5.99'
    title: Section
    description: |
      An identified, unenclosed area within a structure, wing, unit, or room.
      
      Domain: None
      Example: Section 241; Customer Seating; Waiting Area; pont supérieur
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 75
      required: 'No'
    domain: false
  ServiceNum:
    section: '5.100'
    title: Service Number
    description: |
      The numbers that would be dialed on a 12 digit keypad to reach the service appropriate for the location. This is not the same as an Emergency Service Number (ESN) in Legacy E9-1-1 systems. This field is used for all service boundary layers including PsapPolygon, PolicePolygon, FirePolygon, EmsPolygon, and others such as PoisonControlPolygon. Within North America, the Service Number for most services is 9-1-1; however, there may be service boundaries that have a different number that may be associated with them such as Poison Control. Additionally, in some countries, different numbers may be used for Police, Fire, and EMS—this field would be used to denote those numbers.
      
      Domain: A dialable number or dial string
      Example: 911; 18002221222
    definition:
      type: TEXT
      width: 15
      required: 'No'
    domain: false
  ServiceURI:
    section: '5.101'
    title: Service URI
    description: |
      URI for call routing. This attribute is contained in the service boundary layers and will define the URI of the service. The URI is usually a Session Initiation Protocol (e.g., SIP or SIPs) URI that defines the initial route or path the call will take towards the PSAP or agency represented by the boundary.
      
      Domain: Registered domain name
      Example:	sips:sos.psap@eoc.houston.tx.us
      sip:cambriaallianceems.com
      sip:dispatch@harriscountyso.org
      sip:22444032@ohiocountywv.gov:5061
      sip:wexford fire@psap.allegheny.pa.us
    definition:
      type: TEXT
      width: 254
      required: 'Yes'
    domain: true
  ServiceURN:
    section: '5.102'
    title: Service URN
    description: |
      The URN used to select the service for which a route is desired. The ECRF is queried with a location and a Service URN that returns the URI of the appropriate service.
      
      Domain: RFC 5031 defines the Service URN; NENA-STA-010 defines the domain of allowable values. PSAP boundaries SHOULD only contain features with Service URN values of "urn:emergency:service:sos.psap." Values to be used for service boundaries for other responding agencies are found in the IANA urn:emergency:service:responder registry.
      Example:	urn:emergency:service:sos.psap
      urn:emergency:service:responder.police
      urn:emergency:service:responder.fire
      urn:emergency:service:responder.ems
    definition:
      type: TEXT
      width: 100
      required: 'Yes'
    domain: true
  Site:
    section: '5.103'
    title: Site
    description: |
      The name of an exterior area that is publicly known and unique within a given place. A site may contain one or more structures and/or subsites. 
      
      Domain: None
      Example: Jack Perry Plaza; Tiburon Golf Club; San Marcos Premium Outlets; State University of New York at Buffalo North Campus; Parliament Hill; Toronto Pearson International Airport; Prince Edward Island National Park
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  SpeedLimit:
    section: '5.104'
    title: Speed Limit
    description: |
      Posted Speed Limit in MPH or Km/h.
      
      Domain: Whole numbers from 1 to 999
      Example: 35; 55; 70
    definition:
      type: INTEGER
      required: 'No'
    domain: true
  St_Name:
    section: '5.105'
    title: Street Name
    description: |
      The element of the complete street name that identifies the particular thoroughfare (as opposed to any street types, directionals, and modifiers).
      
      Domain: None
      Example: “Hastings” in “East Hastings Street”; “101” in “Highway 101”; “Lionel-Groulx” in “Avenue Lionel-Groulx”
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  St_PosDir:
    section: '5.106'
    title: Street Name Post Directional
    description: |
      A word following the Street Name element that indicates the direction taken by the thoroughfare from an arbitrary starting point or line, or the sector where it is located.
      
      Domain: North; South; East; West; Northeast; Northwest; Southeast; Southwest; Nord; Sud; Est; Ouest; Nord Est; Nord Ouest; Sud Est; Sud Ouest; or equivalent words in other languages
      Example: “North” in “Elm Avenue North”; “Ouest” in “Boulevard Jean Talon Ouest”; “South” in “Pharr Court South Northwest”
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 10
      required: 'No'
    domain: true
  St_PosMod:
    section: '5.107'
    title: Street Name Post Modifier
    description: |
      A word or phrase that follows and modifies the Street Name element but is separated from it by a Street Name Post Type or a Street Name Post Directional or both.
      
      Domain: None
      Example: “Number 5” in “Fire Road Number 5”; “Extension” in “Main Street North Extension”; “Northwest” in “Pharr Court South Northwest”
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 25
      required: 'No'
    domain: false
  St_PosTyp:
    section: '5.108'
    title: Street Name Post Type
    description: |
      A word or phrase that follows the Street Name element and identifies a type of thoroughfare in a complete street name.
      
      Domain: Restricted to values found in the “NENA Registry of Street Name Pre Types and Street Name Post Types” or combinations thereof at:
      http://technet.nena.org/nrs/registry/StreetNamePreTypesAndStreetNamePostTypes.xml
      Example: “Parkway” in “Ocean Parkway”; “Street” in “A Street”; “Rue” in “48e Rue Ouest”
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 50
      required: 'No'
    domain: true
  St_PreDir:
    section: '5.109'
    title: Street Name Pre Directional
    description: |
      A word preceding the Street Name element that indicates the direction taken by the thoroughfare from an arbitrary starting point or line, or the sector where it is located.
      
      Domain: North; South; East; West; Northeast; Northwest; Southeast; Southwest; Nord; Sud; Est; Ouest; Nord Est; Nord Ouest; Sud Est; Sud Ouest; or equivalent words in other languages
      Example: “South” in “South Congress Avenue”; "North" in "Southwest North Globe Avenue"
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 10
      required: 'No'
    domain: true
  St_PreMod:
    section: '5.110'
    title: Street Name Pre Modifier
    description: |
      A word or phrase that precedes and modifies the Street Name element but is separated from it by a Street Name Pre Type or a Street Name Pre Directional or both.
      
      Domain: None
      Example: “Alternate” in “Alternate Route 8”; “Old” in “Old North Church Street”; “Southwest” in “Southwest North Globe Avenue”
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 25
      required: 'No'
    domain: false
  St_PreTyp:
    section: '5.111'
    title: Street Name Pre Type
    description: |
      A word or phrase that precedes the Street Name element and identifies a type of thoroughfare in a complete street name.
      
      Domain: Restricted to values found in the “NENA Registry of Street Name Pre Types and Street Name Post Types” or combinations thereof at: http://technet.nena.org/nrs/registry/StreetNamePreTypesAndStreetNamePostTypes.xml
      Example: “Avenue” in “Avenue A”; “Highway” in “Highway 443”; “Bypass Highway” in “Bypass Highway 22”; “Boulevard” in “Boulevard of the Allies”; “Chemin” in “Chemin de la Canardière”; “Rue” in "Rue Principale”
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 50
      required: 'No'
    domain: true
  St_PreSep:
    section: '5.112'
    title: Street Name Pre Type Separator
    description: |
      A preposition or prepositional phrase between the Street Name Pre Type and the Street Name.
      
      Domain: Restricted to values found in the “NENA Registry of Street Name Pre
      Type Separators” at: http://technet.nena.org/nrs/registry/StreetNamePreTypeSeparators.xml
      Example: “of the” in “Avenue of the Stars”; “du” in “Rue du Petit Champlain”; “in the” in “Circle in the Woods”; “at” in “Avenue at Port Imperial”
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 20
      required: 'No'
    domain: true
  Structure:
    section: '5.113'
    title: Structure
    description: |
      A built feature with a vertical dimension, including both conventional buildings with walls, doors, and a roof, and other kinds of infrastructure such as cell towers, transformer stations, and fuel tanks.
      
      Domain: None
      Example: Fuel Storage Shed; Welcome Center; Confederation Bridge; Core Sciences Building; Tower C
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 75
      required: 'No'
    domain: false
  SubSite:
    section: '5.114'
    title: SubSite
    description: |
      The name of a sub-area within a larger area specified either by a site name, a thoroughfare address, or both.
      
      Domain: None
      Example: South Cell Phone Lot; Tennis Courts; les plaines d’Abraham
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  Unit:
    section: '5.115'
    title: Unit
    description: |
      A group or suite of rooms within a building, under common ownership or tenancy, typically having a common primary entrance.
      
      Domain: None
      Example: Apartment C2; Suite 3103; unité B
      Business Rules: CLDXF-US: Not Applicable; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 75
      required: 'No'
    domain: false
  UnitPreType:
    section: '5.116'
    title: Unit Pre Type
    description: |
      Part of the complete unit identifier that precedes the Unit Value and indicates the kind of unit.
      
      Domain: None
      Example: “Apartment” in “Apartment C2”; “Suite” in “Suite 3103”
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Not Applicable
    definition:
      type: TEXT
      width: 75
      required: 'No'
    domain: false
  UnitValue:
    section: '5.117'
    title: Unit Value
    description: |
      Part of the complete unit identifier that uniquely identifies a particular unit.
      
      Domain: None
      Example: “C2” in “Apartment C2”; “3103” in “Suite 3103”; Penthouse
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Not Applicable
    definition:
      type: TEXT
      width: 75
      required: 'No'
    domain: false
  Valid_L:
    section: '5.118'
    title: Validation Left
    description: |
      Indicates if the address range on the left side of the road segment, relative to the FROM node, should be used for civic location validation. A value of “Y” MAY be entered if any Address Number within the address range on the left side of the road segment should be considered by the LVF to be valid. A value of “N” MAY be entered if the Address Number should only be validated using the SiteStructureAddressPoint layer. If not present, a value of “Y” is assumed.
      
      Domain: Y; N
      Example: Y; N
    definition:
      type: TEXT
      width: 1
      required: 'No'
    domain: true
  Valid_R:
    section: '5.119'
    title: Validation Right
    description: |
      Indicates if the address range on the right side of the road segment, relative to the FROM node, should be used for civic location validation. A value of “Y” MAY be entered if any Address Number within the address range on the right side of the road segment should be considered by the LVF to be valid. A value of “N” MAY be entered if the Address Number should only be validated using the SiteStructureAddressPoint layer. If not present, a value of “Y” is assumed.
      
      Domain: Y; N
      Example: Y; N
    definition:
      type: TEXT
      width: 1
      required: 'No'
    domain: true
  Wing:
    section: '5.120'
    title: Wing
    description: |
      A designated part of a structure that spans one or more floors, typically including more than one unit or room and representing a significant portion of the structure’s floor area.
      
      Domain: None
      Example: Concourse A; North Quadrant; East Wing; Zone Publique – Niveau des Départs
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 75
      required: 'No'
    domain: false

