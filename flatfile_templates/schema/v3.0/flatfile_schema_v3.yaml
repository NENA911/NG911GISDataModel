# ==============================================================================
# Section: 5 Detailed Description of Field Names and associated attribute data
#
# Purpose: Each of the Field Names given in the tables in Section 4, GIS Data
#          Model Layers, are listed in alphabetical order below. Each Field
#          Name has a description, attribute data domain, and an example. Some
#          Field Names include a conditional business rule that controls the
#          presence of a value in the data field. For details on case
#          sensitivity, please refer to Section 3.5 Case Sensitivity of
#          NENA-STA-006.
#
#          An attribute data domain defines the set of all valid values that
#          are allowed in the attribute data field. If the domain is none,
#          then any value that matches the data type and description MAY be
#          used for the attribute field. Those with a given data domain MUST
#          use only those values with the domain given. Web links in the
#          examples are for illustrative purposes.
# ==============================================================================

fields:      
  AddCode:
    section: '5.1'
    title: 'Additional Code'
    description: |
      A case-sensitive alphanumeric code of up to six characters, used to disambiguate addresses in Canada when the combination of Administrative Level 2, Administrative Level 3, Administrative Level 4 (if used), and Street Name may not be unique within a province or territory.
      
      Domain: None
      Example: 3h12jk; 100232; AREQUF
      Business Rules: CLDXF-US: Not Applicable; CLDXF-CA: Yes
    definition:
      type: 'TEXT'
      width: 6
      required: false
    domain: false
  AddCode_L:
    section: 5.2
    title: 'Additional Code Left'
    description: |
      The Additional Code on the left side of the road segment relative to the FROM Node.
      
      Domain: None 
      Example: 3h12jk; 100232; AREQUF
      Business Rules: CLDXF-US: Not Applicable; CLDXF-CA: Yes
    definition:
      type: 'TEXT'
      width: 6
      required: false
    domain: false
  AddCode_R:
    section: 5.3
    title: 'Additional Code Right'
    description: |
      The Additional Code on the right side of the road segment relative to the FROM Node.
      
      Domain: None 
      Example: 3h12jk; 100232; AREQUF
      Business Rules: CLDXF-US: Not Applicable; CLDXF-CA: Yes
    definition:
      type: 'TEXT'
      width: 6
      required: false
    domain: false
  AddDataURI:
    section: 5.4
    title: 'Additional Data URI'
    description: |
      URI(s) for additional data associated with the address. This attribute is contained in the SiteStructureAddressPoint and SiteStructureAddressPolygon layers and will define the URI of additional information about a location, including building information (blueprints, contact info, floor plans, etc.).
      
      Domain: None
      Example: https://addl68603.example.com
    definition:
      type: 'TEXT'
      width: 254
      required: false
    domain: false
  Addtl_Loc:
    section: 5.5
    title: 'Additional Location Information'
    description: |
      Information that relates to location but does not meet the definition of any other named location elements.
      
      Domain: None
      Example: Main Loading Dock; Stairwell C; Elevator Bank 14-21
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: 'TEXT'
      width: 225
      required: false
    domain: false
  Add_Number:
    section: '5.6'
    title: Address Number
    description: |
      The integer identifier of a location along a thoroughfare or within a defined community.
      
      Domain: None 
      Example: “1600” in “1600 Pennsylvania Avenue”; “24” in “24 Sussex Drive”
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: INTEGER
      width: 6
      required: 'No'
    domain: false
  AddNum_Cmp:
    section: '5.7'
    title: Address Number Complete
    description: |
      The Address Number Complete includes the Address Number Prefix (if any), the Address Number, Address Number Suffix (if any), and any formatting or separator characters needed to display the official version of the complete address number. The Address Number Complete precedes the complete street name to identify a location along a thoroughfare or within a defined area.
      
      Domain: None
      Example: A19; 194-03½; N89W16758
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Not Applicable
    definition:
      type: TEXT
      width: 42
      required: 'No'
    domain: false
  AddNum_Pre:
    section: '5.8'
    title: Address Number Prefix
    description: |
      An identifier that precedes the Address Number and further identifies a location along a thoroughfare or within a defined area.
      
      Domain: None
      Example: “A” in “A19 route 117”; “75” in “75 6214 Kailua Place” (CLDXF-US only); “75-” in “75-6214 Kailua Place” (CLDXF-CA only)
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 15
      required: 'No'
    domain: false
  AddNum_Suf:
    section: '5.9'
    title: Address Number Suffix
    description: |
      An extension of the Address Number that follows it and further identifies a location along a thoroughfare or within a defined area.
      
      Domain: None
      Example: “B” in “223B Jay Avenue”; “½” in 119½ Elm Street” (CLDXF-US only); “1/2” in “119 1/2 Elm Street” (CLDXF-CA only)
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 15
      required: 'No'
    domain: false
  A1:
    section: '5.10'
    title: Administrative Level 1
    description: |
      The name of a state, province, or territory represented by the two letter UPPERCASE abbreviation given in ISO-3166-2.
      
      Domain: ISO-3166-2 or USPS Publication 28 (for the United States)
      Example: TN; NS; YT; PR
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 2
      required: 'Yes'
    domain: true
  A1_L:
    section: '5.11'
    title: Administrative Level 1 Left
    description: |
      Description: The Administrative Level 1 value on the left side of the road segment relative to the FROM Node.
      
      Domain: ISO-3166-2 or USPS Publication 28 (for the United States)
      Example: LA; NB
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 2
      required: 'Yes'
    domain: true
  A1_R:
    section: '5.12'
    title: Administrative Level 1 Right
    description: |
      The Administrative Level 1 value on the right side of the road segment relative to the FROM Node.
      
      Domain: ISO-3166-2 or USPS Publication 28 (for the United States)
      Example: PA; NU
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 2
      required: 'Yes'
    domain: true
  A2:
    section: '5.13'
    title: Administrative Level 2
    description: |
      The name of the primary subdivision of a state, province, or territory.
      
      Domain: CLDXF-US: A complete list is maintained by the US Census Bureau as ANSI INCITS 31:2009 (Formerly FIPS 6-4) and the Domain is restricted to the exact listed values as published in ANSI INCITS 31:2009, including casing and use of abbreviations.
      CLDXF-CA: None
      Example: Washington County; District of Columbia; Capitale-Nationale; Region of Peel
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  A2_L:
    section: '5.14'
    title: Administrative Level 2 Left
    description: |
      The Administrative Level 2 value on the left side of the road segment relative to the FROM Node. 
      
      Domain: CLDXF-US: A complete list is maintained by the US Census Bureau as ANSI INCITS 31:2009 (Formerly FIPS 6-4) and the Domain is restricted to the exact listed values as published in ANSI INCITS 31:2009, including casing and use of abbreviations.
      CLDXF-CA: None
      Example: St. Louis County; Adams County; Northumberland; Central Kootenay
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  A2_R:
    section: '5.15'
    title: Administrative Level 2 Right
    description: |
      The Administrative Level 2 value on the right side of the road segment relative to the FROM Node.
      
      Domain: CLDXF-US: A complete list is maintained by the US Census Bureau as ANSI INCITS 31:2009 (Formerly FIPS 6-4) and the Domain is restricted to the exact listed values as published in ANSI INCITS 31:2009, including casing and use of abbreviations.
      CLDXF-CA: None
      Example: St. Johns County; DeSoto County; Doña Ana County; Guysborough
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  A3:
    section: '5.16'
    title: Administrative Level 3
    description: |
      The name of the secondary division of a state, province, or territory. In Canada, where no Administrative Level 2 exists, it can be the name of the primary division of the province or territory.
      
      Domain: None
      Example: Southlake; Alpine; Yellowknife
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  A3_L:
    section: '5.17'
    title: Administrative Level 3 Left
    description: |
      The Administrative Level 3 value on the left side of the road segment relative to the FROM Node.
      
      Domain: None
      Example: Lexington; Columbus; Mont Saint Grégoire
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  A3_R:
    section: '5.18'
    title: Administrative Level 3 Right
    description: |
      The Administrative Level 3 value on the right side of the road segment relative to the FROM Node.
      
      Domain: None
      Example: Tampa; Yonkers; Toronto
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  A4:
    section: '5.19'
    title: Administrative Level 4
    description: |
      The name of the subdivision of the most granular preceding administrative level.
      
      Domain: None
      Example: Cypress; Bowen; Mont Élie
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  A4_L:
    section: '5.20'
    title: Administrative Level 4 Left
    description: |
      The Administrative Level 4 value on the left side of the road segment relative to the FROM Node.
      
      Domain: None
      Example: Latham; Moose; Sherwood Park
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  A4_R:
    section: '5.21'
    title: Administrative Level 4 Right
    description: |
      The Administrative Level 4 value on the right side of the road segment relative to the FROM Node.
      
      Domain: None
      Example: Mountain View; Palmer; Picard
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  A5:
    section: '5.22'
    title: Administrative Level 5
    description: |
      The name of the most granular administrative level supported by this standard. It is typically an unincorporated portion of a preceding administrative level.
      
      Domain: None
      Example: Copperfield; University Heights; Shady Oaks Mobile Home Park; Sutton
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  A5_L:
    section: '5.23'
    title: Administrative Level 5 Left
    description: |
      The Administrative Level 5 value on the left side of the road segment relative to the FROM Node.
      
      Domain: None
      Example: East Harlem; Cypress Meadows Subdivision
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  A5_R:
    section: '5.24'
    title: Administrative Level 5 Right
    description: |
      The Administrative Level 5 value on the right side of the road segment relative to the FROM Node.
      
      Domain: None
      Example: Edgewater Park; The Meadows
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 254
      required: 'No'
    domain: false
  Agency_ID:
    section: '5.25'
    title: Agency Identifier
    description: |
      A Domain Name System (DNS) domain name which is used to uniquely identify an agency. An agency is represented by a fully qualified domain name as defined in NENA-STA-010. In order to correlate actions across a wide range of calls and incidents, each agency MUST use one domain name consistently. Any domain name in the public DNS is acceptable so long as each distinct agency uses a different domain name. This ensures that each agency identifier is globally unique.
      
      Domain: Fully qualified domain name
      Example: psap.harriscounty.tx.us; police.allegheny.pa.us; newbrunswick.ca; flctnecd.gov
      Note: The Agency Identifier is a field in service boundary layers that identifies the agency the boundary defines. It is also used in the Emergency Incident Data Object, the Service/Agency Locator, and MUST be used in constructing NGUIDs.
    definition:
      type: TEXT
      width: 100
      required: 'Yes'
    domain: true
  AVcard_URI:
    section: '5.26'
    title: Agency vCard URI
    description: |
      A vCard is a file format standard for electronic business cards. The Agency vCard URI is the internet address of a JavaScript Object Notation (JSON) data structure which contains contact information (Name of Agency, Contact phone numbers, etc.) in the form of a jCard (RFC 7095). The vCard URI is used in the service boundary layers to provide contact information for that agency. The Agency Locator (see NENA-STA-010) provides the URIs for Agencies listed in it.
      
      Domain: None
      Example: https://vcard.psap.allegheny.pa.us; https://jcard.houstontx.gov/fire
      Note: This field will be considered for deletion in a future version of this document to align with future changes in NENA-STA-010.
    definition:
      type: TEXT
      width: 254
      required: 'Yes'
    domain: false
  Altitude:
    section: '5.27'
    title: Altitude
    description: |
      The measure of the orthogonal distance from the WGS84 ellipsoid, given in meters. For Site/Structure Address Points, Altitude measures the orthogonal distance from the WGS84 ellipsoid to the surface (such as a floor or ground).
      
      Domain: Restricted to a double-precision floating point number with a precision of nine and a scale of three (e.g., REAL (9,3)).
      Example: “75.000” representing the altitude (in meters) associated with the address “123 Main Street, Suite 401”
      Note: WGS84 (GPS) altitude, also known as the Z Coordinate, is measured as distance above or below the ellipsoid, which varies significantly from the geoid (approximately mean sea level). For more information, see NENA Requirements for 3D Location Data for E9-1-1 and NG9-1-1, NENA-REQ-003.
    definition:
      type: REAL
      precision: 9
      scale: 3
      required: 'No'
    domain: false
  Country:
    section: '5.28'
    title: Country
    description: |
      The name of a country represented by its two letter ISO-3166-1 English country alpha 2 code elements in UPPERCASE letters.
      
      Domain: Restricted to the two letter designations provided in ISO-3166-1.
      Example: "US" for the United States of America; "CA" for Canada
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 2
      required: 'Yes'
    domain: true
  Country_L:
    section: '5.29'
    title: Country Left
    description: |
      The name of the Country on the left side of the road segment relative to the FROM Node, represented by its two letter ISO-3166-1 English country alpha 2 code elements in UPPERCASE letters.
      
      Domain: Restricted to the two letter designations provided in ISO-3166-1.
      Example: "US" for the United States of America; "CA" for Canada
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 2
      required: 'Yes'
    domain: true
  Country_R:
    section: '5.30'
    title: Country Right
    description: |
      The name of the Country on the right side of the road segment relative to the FROM Node, represented by its two letter ISO-3166-1 English country alpha 2 code elements in UPPERCASE letters.
      
      Domain: Restricted to the two letter designations provided in ISO-3166-1.
      Example: "US" for the United States of America; "MX" for Mexico
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 2
      required: 'Yes'
    domain: true
  DateUpdate:
    section: '5.31'
    title: Date Updated
    description: |
      The date and time that the record was created or last modified. This value MUST be populated upon modifications to attributes, geometry, or both.
      
      Domain: None
      Example: (of a W3C dateTime with optional precision of .1 second)
      2017 12 21T17:58.03.1 05:00 (representing a record updated on December 21, 2017 at 5:58 and 3.1 seconds PM US Eastern Standard Time); 2017 07 11T08:31:15.2 04:00 (representing a record updated on July 11, 2017 at 8:31 and 15.2 seconds AM US Eastern Daylight Time)
    definition:
      type: DATETIME
      required: 'Yes'
    domain: true
  Dir_Travel:
    section: '5.32'
    title: Direction of Travel
    description: |
      A word that follows all other street name elements and is used only as needed to indicate direction of travel on a divided roadway and associated frontage roads.
      
      Domain: None
      Example: northbound; eastbound
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Not Applicable
    definition:
      type: TEXT
      width: 10
      required: 'No'
    domain: false
  DiscrpAgID:
    section: '5.33'
    title: Discrepancy Agency ID
    description: |
      Agency that receives a Discrepancy Report (DR), should a discrepancy be discovered, and will take responsibility for ensuring discrepancy resolution. This may or may not be the same as the 9-1-1 Authority. This MUST be represented by a domain name that is an Agency Identifier as defined in the NENA Knowledge Base Glossary.
      
      Domain: None
      Example: Vermont911.vt.us.gov; nct911.dst.tx.us
    definition:
      type: TEXT
      width: 100
      required: 'Yes'
    domain: false
  DsplayName:
    section: '5.34'
    title: Display Name
    description: |
      A description or "name" of the service provider that offers services within the area of a Service Boundary. This value MUST be suitable for display.
      
      Domain: None
      Example: New York Police Department; Med Life Ambulance Services
    definition:
      type: TEXT
      width: 60
      required: 'Yes'
    domain: false
  DistMarker:
    section: '5.35'
    title: Distance Marker
    description: |
      A physical marker labeled with the distance from or to a given point along a route such as a trail, a waterway, a road, or a highway. 
      
      Domain: None
      Example: Milepost 13; Mile Marker 327.5; Station 101 North; Kilometre 10
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 150
      required: 'No'
    domain: false
  DM_Ind:
    section: '5.36'
    title: Distance Marker Indicator
    description: |
      Indicator of the type of distance marker.
      
      Domain: P (for Posted); L (for Logical/calculated measurement)
      Example: P; L
    definition:
      type: TEXT
      width: 1
      required: 'Yes'
    domain: true
  DM_Label:
    section: '5.37'
    title: Distance Marker Label
    description: |
      The label or text on a physical distance marker. Note that the posted label may be different from the actual measure.
      
      Domain: None
      Example: MM 3.5; HWY 102 SOUTH 19 KM; 14
      Business Rules: If the Distance Marker Indicator value is "P" and the physical distance marker is labeled, the Distance Marker Label MUST be populated. If the Distance Marker Indicator value is "P" and the physical distance marker is not physically labeled, the Distance Marker Label MAY be populated with a description.
    definition:
      type: TEXT
      width: 100
      required: 'No'
    domain: false
  DM_Value:
    section: '5.38'
    title: Distance Marker Measurement Value
    description: |
      Linear distance from a reference point or the actual value of the distance measurement.
      
      Domain: Restricted to a double-precision floating point number with a precision of nine and a scale of three (e.g., REAL (9,3)).
      Example: 357.44; 10.0
    definition:
      type: REAL
      precision: 9
      scale: 3
      required: 'Yes'
    domain: false
  DM_Rte:
    section: '5.39'
    title: Distance Marker Route Name
    description: |
      The primary route name the distance marker is associated with.
      
      Domain: None
      Example: I 90; US 66; St. Lawrence River; South Beaver Creek Trail; CSX Railroad Blue Island to Utica
    definition:
      type: TEXT
      width: 100
      required: 'Yes'
    domain: false
  DM_Type:
    section: '5.40'
    title: Distance Marker Route Type
    description: |
      The type of route the distance marker refers to.
      Domain: None
      Example: Road; Waterway; Beach; Trail; Railroad
    definition:
      type: TEXT
      width: 15
      required: 'No'
    domain: false
  DM_Unit:
    section: '5.41'
    title: Distance Marker Unit of Measurement
    description: |
      Unit of measurement used for the distance marker.
      
      Domain: Standardized units of measure
      Example: miles; nautical miles; feet; meters; kilometers
    definition:
      type: TEXT
      width: 15
      required: 'No'
    domain: true
  Effective:
    section: '5.42'
    title: Effective Date
    description: |
      The date and time that the record is scheduled to take effect.
      
      Domain: None
      Example: (of a W3C dateTime with optional precision of .1 second)
      2017 02 18T02:30:00.1 05:00 (representing a record that will become active on February 18, 2017 at 2:30 and 0.1 seconds AM US Eastern Standard Time); 2017 10 09T13:01:35.2 04:00 (representing a record that will become active on October 9, 2017 at 1:01 and 35.2 seconds PM US Eastern Daylight Time)
      Note: This field is used when the time and date of a change is known. For example, the time and date an annexation takes effect.
    definition:
      type: DATETIME
      required: 'No'
    domain: false
  Elevation:
    section: '5.43'
    title: Elevation
    description: |
      The orthogonal distance of the Earth’s surface from the WGS84 ellipsoid given in meters at the Site/Structure Address Point’s latitude and longitude; also, the Altitude of the ground level. Within a structure, this is “the zero floor level.”
      
      Domain: Restricted to a double-precision floating point number with a precision of nine and a scale of three (e.g., REAL (9,3)).
      Example: “68.000” representing the elevation (in meters) associated with ground level.
      Note: WGS84 (GPS) elevation is measured as the distance from the ellipsoid, which varies significantly from the geoid (approximately mean sea level). For more information, see NENA Requirements for 3D Location Data for E9-1-1 and NG9-1-1, NENA-REQ-003.
    definition:
      type: REAL
      precision: 9
      scale: 3
      required: 'No'
    domain: false
  ESN:
    section: '5.44'
    title: ESN
    description: |
      A 3-5 character numeric string that represents one or more Emergency Service Zones (ESZ).
      
      Domain: Characters from 000 to 99999
      Example: 54321; 120; 001
      Conditional Business Rule: All Legacy fields MUST be populated with the exact matching value from the corresponding MSAG record (including space characters) if and only if a value exists. If no value exists, the field shall remain empty. Any new entries MUST be consistent between the GIS and MSAG systems of record. Service provider-specific legacy deployments should be taken into consideration.
      Note: The legacy fields are used primarily for the MCS to ensure that PIDF-LO records are able to return an MSAG-valid address and/or MSAG-valid address records are able to return a PIDF-LO record. The legacy fields may also provide backward compatibility with legacy map display and CAD systems.
    definition:
      type: TEXT
      width: 5
      required: 'No'
    domain: false
  ESN_L:
    section: '5.45'
    title: ESN Left
    description: |
      The Emergency Service Number (ESN) on the left side of the road segment relative to the FROM Node.
      
      Domain: Characters from 000 to 99999
      Example: 5422; 124; 005
      Conditional Business Rule: All Legacy fields MUST be populated with the exact matching value from the corresponding MSAG record (including space characters) if and only if a value exists. If no value exists, the field shall remain empty. Any new entries MUST be consistent between the GIS and MSAG systems of record. Service provider-specific legacy deployments should be taken into consideration.
      Note: The legacy fields are used primarily for the MCS to ensure that PIDF-LO records are able to return an MSAG-valid address and/or MSAG-valid address records are able to return a PIDF-LO record. The legacy fields may also provide backward compatibility with legacy map display and CAD systems.
    definition:
      type: TEXT
      width: 5
      required: 'No'
    domain: false
  ESN_R:
    section: '5.46'
    title: ESN Right
    description: |
      The Emergency Service Number (ESN) on the right side of the road segment relative to the FROM Node.
      
      Domain: Characters from 000 to 99999
      Example: 5423; 125; 007
      Conditional Business Rule: All Legacy fields MUST be populated with the exact matching value from the corresponding MSAG record (including space characters) if and only if a value exists. If no value exists, the field shall remain empty. Any new entries MUST be consistent between the GIS and MSAG systems of record. Service provider-specific legacy deployments should be taken into consideration.
      Note: The legacy fields are used primarily for the MCS to ensure that PIDF-LO records are able to return an MSAG-valid address and/or MSAG-valid address records are able to return a PIDF-LO record. The legacy fields may also provide backward compatibility with legacy map display and CAD systems.
    definition:
      type: TEXT
      width: 5
      required: 'No'
    domain: false
  Expire:
    section: '5.47'
    title: Expiration Date
    description: |
      The date and time when the information in the record is no longer considered valid.
      
      Domain: None
      Example: (of a W3C dateTime with optional precision of .1 second)
      2017 02 18T02:30:00.1 05:00 (representing a record that will expire and no longer be valid on February 18, 2017 at 2:30 and 0.1 seconds AM US Eastern Standard Time);
      2017 10 09T13:01:35.2 04:00 (representing a record that will expire and no longer be valid on October 9, 2017 at 1:01 and 35.2 seconds PM US Eastern Daylight Time)
      Note: This field is used when the time and date of a change is known. For example, the time and date an annexation takes effect and the previous boundary is retired.
    definition:
      type: DATETIME
      required: 'No'
    domain: false
  FloorIndex:
    section: '5.48'
    title: Floor Index
    description: |
      An internal counter or index of floor, story, or level within a building stored as an integer to convey the range and relationships between floors. Having a floor integer independent of the floor label provides an absolute measure that can be used to convey and operationalize vertical uncertainty and will assist first responders in arriving at the location of the emergency.
      
      The level of an addressed main entrance is “0.” Each floor or partial floor is sequentially incremented by 1 above or below 0. This is not intended for user display. It is intended to be used for internal processing or calculations.
      
      Domain: Integers
      Example: -2; -1; 0; 1; 2; 3; 4; 5; 6. See Figure 5-1 in NENA-STA-006.
    definition:
      type: INTEGER
      required: 'No'
    domain: false
  Floor:
    section: '5.49'
    title: Floor Label
    description: |
      A description of floor, story, or level within a building stored as text. This may be considered part of a “dispatchable location.”
      
      Domain: None
      Example: Floor 5; 5th Floor; Mezzanine. See Figure 5-1 in NENA-STA-006.
    definition:
      type: TEXT
      width: 75
      required: 'No'
    domain: false
  Height:
    section: '5.50'
    title: Height
    description: |
    definition:
      type: REAL
      precision: 9
      scale: 3
      required: 'No'
    domain: false
  HP_Name:
    section: '5.51'
    title: Hydrology Polygon Name
    description: |
      Name of a lake, pond, waterway, or similar body of water.
      
      Domain: None
      Example: Mirror Lake; intracoastal waterway
    definition:
      type: TEXT
      width: 100
      required: 'No'
    domain: false
  HP_Type:
    section: '5.52'
    title: Hydrology Polygon Type
    description: |
      Type of water body.
      
      Domain: None
      Example: lake; pond; stream; river
    definition:
      type: TEXT
      width: 100
      required: 'No'
    domain: false
  HS_Name:
    section: '5.53'
    title: Hydrology Segment Name
    description: |
      The name of a creek, stream, river, or similar linear water feature.
      
      Domain: None
      Example: Willow Creek; Red River
    definition:
      type: TEXT
      width: 100
      required: 'No'
    domain: false
  HS_Type:
    section: '5.54'
    title: Hydrology Segment Type
    description: |
      The type of surface water.
      
      Domain: None
      Example: stream; river
    definition:
      type: TEXT
      width: 100
      required: 'No'
    domain: false
Latitude:
  section: '5.55'
  title: Latitude
  description: |
    The angular distance of a location north or south of the equator as defined by the coordinate system, expressed in decimal degrees.
    
    Domain: Restricted to a double-precision floating point number, between +90 degrees to  90 degrees, with a precision of ten and a scale of seven (e.g., REAL (10,7)).
    Example: 40.8686865
  definition:
    type: REAL
    precision: 10
    scale: 7
    required: 'No'
  domain: false
  AdNumPre_L:
    section: '5.56'
    title: Left Address Number Prefix
    description: |
      An identifier that precedes the Address Number, applying to all address numbers on the left side of the road segment relative to the FROM Node, and further identifies a location along a thoroughfare or within a defined area.
      
      Domain: None
      Example: “A” in “A19 route 117”; “75” in “75 6214 Kailua Place” (CLDXF-US only); “75-” in “75-6214 Kailua Place” (CLDXF-CA only)
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 15
      required: 'No'
    domain: false
  FromAddr_L:
    section: '5.57'
    title: Left FROM Address Number
    description: |
      In the RoadCenterLine layer, each feature has a begin point and an endpoint. The FROM Node is the begin point while the TO Node is the endpoint. Each has a left side and a right side relative to a begin node and an end node. The Left FROM address is the address number on the left side of the road segment relative to the FROM Node.
      
      Domain: None
      Example: See Figure 5-2 in NENA-STA-006
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: INTEGER
      required: 'Yes'
    domain: false
  ToAddr_L:
    section: '5.58'
    title: Left TO Address Number
    description: |
      In the RoadCenterLine layer, each feature has a begin point and an endpoint. The FROM Node is the begin point while the TO Node is the endpoint. Each has a left side and a right side relative to a begin node and an end node. The Left TO address is the address number on the left side of the road segment relative to the TO Node.
      
      Domain: None
      Example: See Figure 5-2 in NENA-STA-006
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: INTEGER
      required: 'Yes'
    domain: false
  LCountyID:
    section: '5.59'
    title: Legacy County ID
    description: |
      The existing County ID as found in the MSAG for the corresponding MSAG record with which the address point is associated. This is typically the same County ID value found on the corresponding Road Centerline segment.
      
      Domain: None
      Example: 021; FRKL
      Conditional Business Rule: All Legacy fields MUST be populated with the exact matching value from the corresponding MSAG record (including space characters and casing) if and only if a value exists. If no value exists, the field shall remain empty. Any new entries MUST be consistent between the GIS and MSAG systems of record. Service provider-specific legacy deployments should be taken into consideration.
      Note: The legacy fields are used primarily for the MCS to ensure that PIDF-LO records are able to return an MSAG-valid address and/or MSAG-valid address records are able to return a PIDF-LO record. The legacy fields may also provide backward compatibility with legacy map display and CAD systems.
    definition:
      type: TEXT
      width: 5
      required: 'No'
    domain: false
  LCntyID_L:
    section: '5.60'
    title: Legacy County ID Left
    description: |
      The existing County ID as found in the MSAG on the left side of the road segment relative to the FROM Node.
      
      Domain: None
      Example: 021; FRKL
      Conditional Business Rule: All Legacy fields MUST be populated with the exact matching value from the corresponding MSAG record (including space characters and casing) if and only if a value exists. If no value exists, the field shall remain empty. Any new entries MUST be consistent between the GIS and MSAG systems of record. Service provider-specific legacy deployments should be taken into consideration.
      Note: The legacy fields are used primarily for the MCS to ensure that PIDF-LO records are able to return an MSAG-valid address and/or MSAG-valid address records are able to return a PIDF-LO record. The legacy fields may also provide backward compatibility with legacy map display and CAD systems.
    definition:
      type: TEXT
      width: 5
      required: 'No'
    domain: false
  LCntyID_R:
    section: '5.61'
    title: Legacy County ID Right
    description: |
      The existing County ID as found in the MSAG on the right side of the road segment relative to the FROM Node.
      
      Domain: None
      Example: 021; FRKL
      Conditional Business Rule: All Legacy fields MUST be populated with the exact matching value from the corresponding MSAG record (including space characters and casing) if and only if a value exists. If no value exists, the field shall remain empty. Any new entries MUST be consistent between the GIS and MSAG systems of record. Service provider-specific legacy deployments should be taken into consideration.
      Note: The legacy fields are used primarily for the MCS to ensure that PIDF-LO records are able to return an MSAG-valid address and/or MSAG-valid address records are able to return a PIDF-LO record. The legacy fields may also provide backward compatibility with legacy map display and CAD systems.
    definition:
      type: TEXT
      width: 5
      required: 'No'
    domain: false
  LSt_Name:
    section: '5.62'
    title: Legacy Street Name
    description: |
      The street name as it currently exists in the MSAG. Ideally, this is the name as assigned by the local addressing authority. However, it is imperative that the content of the “Legacy Street Name” field in the GIS data and the content of the “Street Name” field in the MSAG MUST be identical. If there are discrepancies, one of these two databases (GIS and/or MSAG) MUST be updated to match the other.
      
      Domain: None
      Example: “STATE” in “STATE ST”; “ELMWOOD” in “N ELMWOOD AVE”
      Conditional Business Rule: All Legacy fields MUST be populated with the exact matching value from the corresponding MSAG record (including space characters and casing) if and only if a value exists. If no value exists, the field shall remain empty. Any new entries MUST be consistent between the GIS and MSAG systems of record. Service provider-specific legacy deployments should be taken into consideration.
      Note: The legacy fields are used primarily for the MCS to ensure that PIDF-LO records are able to return an MSAG-valid address and/or MSAG-valid address records are able to return a PIDF-LO record. The legacy fields may also provide backward compatibility with legacy map display and CAD systems.
    definition:
      type: TEXT
      width: 75
      required: 'No'
    domain: false
  LSt_PosDir:
    section: '5.63'
    title: Legacy Street Name Post Directional
    description: |
      The trailing street direction suffix as it currently exists in the MSAG. Ideally, this is the street name post directional as assigned by the local addressing authority. However, it is imperative that the content of the “Legacy Street Name Post Directional” field in the GIS data and the “Post Directional” field in the MSAG MUST be identical. If there are discrepancies, one of these two databases (GIS and/or MSAG) MUST be updated to match the other.
      
      Domain: N; S; E; W; NE; NW; SE; SW; O; NO; SO; or equivalent abbreviations in other languages
      Example: “E” in “CHURCH ST E”; “O” in “JEAN TALON BD O”
      Conditional Business Rule: All Legacy fields MUST be populated with the exact matching value from the corresponding MSAG record (including space characters and casing) if and only if a value exists. If no value exists, the field shall remain empty. Any new entries MUST be consistent between the GIS and MSAG systems of record. Service provider-specific legacy deployments should be taken into consideration.
      Notes:
      •	The domain values “O,” “NO,” and “SO” are the French equivalent abbreviations for the English language West “W”, Northwest “NW”, and Southwest “SW.”
      •	The legacy fields are used primarily for the MCS to ensure that PIDF-LO records are able to return an MSAG-valid address and/or MSAG-valid address records are able to return a PIDF-LO record. The legacy fields may also provide backward compatibility with legacy map display and CAD systems.
    definition:
      type: TEXT
      width: 2
      required: 'No'
    domain: false
  LSt_PreDir:
    section: '5.64'
    title: Legacy Street Name Pre Directional
    description: |
      The leading street direction prefix as it currently exists in the MSAG. Ideally, this is the street name pre directional as assigned by the local addressing authority. However, it is imperative that the “Legacy Street Name Pre Directional” field in the GIS data and the “Prefix Directional” field in the MSAG MUST be identical. If there are discrepancies, one of these two databases (GIS and/or MSAG) MUST be updated to match the other.
      
      Domain: N; S; E; W; NE; NW; SE; SW; O; NO; SO; or equivalent abbreviations in other languages
      Example: “S” in “S PINE AVE”
      Conditional Business Rule: All Legacy fields MUST be populated with the exact matching value from the corresponding MSAG record (including space characters and casing) if and only if a value exists. If no value exists, the field shall remain empty. Any new entries MUST be consistent between the GIS and MSAG systems of record. Service provider-specific legacy deployments should be taken into consideration.
      Notes:
      •	The domain values “O,” “NO,” and “SO” are the French equivalent abbreviations for the English language West “W”, Northwest “NW”, and Southwest “SW.”
      •	The legacy fields are used primarily for the MCS to ensure that PIDF-LO records are able to return an MSAG-valid address and/or MSAG-valid address records are able to return a PIDF-LO record. The legacy fields may also provide backward compatibility with legacy map display and CAD systems.
    definition:
      type: TEXT
      width: 2
      required: 'No'
    domain: true
  LSt_Typ:
    section: '5.65'
    title: Legacy Street Name Type
    description: |
      The valid street abbreviation as it currently exists in the MSAG. Ideally, this is the street name type as assigned by the local addressing authority. However, it is imperative that the “Legacy Street Name Type” in the GIS data and the “Street Suffix” field in the MSAG MUST be identical. If there are discrepancies, one of these two databases (GIS and/or MSAG) MUST be updated to match the other.
      
      Domain: None
      Example: “ST” for “STREET”; “STR” for “STREET”; “BLVD” for “BOULEVARD”; “AVE” for “AVENUE”; “TRCE” for “TRACE”; “RU” in “48 RU O”; “BD” in “JEAN TALON BD O”
      Conditional Business Rule: All Legacy fields MUST be populated with the exact matching value from the corresponding MSAG record (including space characters and casing) if and only if a value exists. If no value exists, the field shall remain empty. Any new entries MUST be consistent between the GIS and MSAG systems of record. Service provider-specific legacy deployments should be taken into consideration.
    definition:
      type: TEXT
      width: 4
      required: 'No'
    domain: false
  LocMarker:
    section: '5.66'
    title: Location Marker
    description: |
      A uniquely identified and indivisible infrastructure component, smaller than a structure, which exists either within a structure or exterior to any structure, such as an alarm box, a utility pole, a callbox, or other similar features.
      
      Domain: None
      Example: Callbox AB-12-34; Pole 12; Low Water Crossing #12
      Business Rules: CLDXF-US: Yes; CLDXF-CA: Yes
    definition:
      type: TEXT
      width: 100
      required: 'No'
    domain: false
  LM_Ind:
    section: '5.67'
