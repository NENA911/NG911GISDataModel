    metadata:
      -descriptions: |
        Roads data is maintained as a line layer for representing the centerline of a roadway. This dataset is referred to as the RoadCenterLine layer in the GIS Data Layers and Indicators registry in Section 7.1 “GIS Data Layers” Registry “GIS Layers and Indicators” Registry and in NENA documents going forward. GIS road centerline arc node topology is associated with attribute data containing information on street names, address ranges, jurisdictional boundaries, and other attributes. The RoadCenterLine layer is an integral part of any public safety GIS due to its versatility and use for:
        
        •	Querying and geocoding of civic addresses based on dual (left/right) address ranges
        •	Tactical map display
        •	Map and attribute viewing
        •	Map production
        •	Location and driving directions
        •	Integration of network topology to allow vehicle routing, drive time analysis
        •	Integration of spatially related attributes for advanced applications including those focused on public safety, asset management, planning, utilities, and public works
        
        All Road Centerlines MUST have the Street Name field populated, even if unnamed.
